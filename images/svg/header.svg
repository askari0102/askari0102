<svg viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Styling Terminal & Text */
    .terminal-bg { fill: #0f172a; stroke: #1e293b; stroke-width: 2; }
    .dot-red { fill: #ef4444; }
    .dot-yel { fill: #eab308; }
    .dot-grn { fill: #22c55e; }
    
    .text-title { font-family: 'Courier New', Courier, monospace; font-size: 32px; font-weight: bold; fill: #38bdf8; }
    .text-sub { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 18px; fill: #94a3b8; }
    .text-prompt { font-family: 'Courier New', Courier, monospace; font-size: 20px; font-weight: bold; fill: #22c55e; }

    /* Animasi Kursor Berkedip */
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .cursor { fill: #38bdf8; animation: blink 1s step-end infinite; }
    .cursor-sub { fill: #94a3b8; animation: blink 1s step-end infinite; }
  </style>

  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
  </filter>

  <rect x="20" y="20" width="760" height="160" rx="12" class="terminal-bg" filter="url(#shadow)" />

  <circle cx="50" cy="45" r="7" class="dot-red" />
  <circle cx="75" cy="45" r="7" class="dot-yel" />
  <circle cx="100" cy="45" r="7" class="dot-grn" />
  <text x="400" y="50" font-family="monospace" font-size="14" fill="#475569" text-anchor="middle">root@devops-server: ~</text>
  <line x1="20" y1="65" x2="780" y2="65" stroke="#1e293b" stroke-width="2" />

  <g transform="translate(45, 110)">
    <text class="text-prompt">$&gt;</text>
    <text x="40" class="text-title" clip-path="url(#clip-title)">MUWAHIDUN ASYKARI</text>
    <rect class="cursor" y="-22" width="16" height="28">
      <animate attributeName="x" from="40" to="380" dur="2s" fill="freeze" />
      <animate attributeName="opacity" values="1" dur="2.5s" fill="freeze" />
      <animate attributeName="visibility" to="hidden" begin="2.5s" fill="freeze" />
    </rect>
  </g>

  <g transform="translate(45, 145)">
    <text class="text-prompt" visibility="hidden">
      $&gt;
      <animate attributeName="visibility" to="visible" begin="2.5s" fill="freeze" />
    </text>
    <text x="40" class="text-sub" clip-path="url(#clip-sub)">DevOps, Software Architecture, Cloud &amp; AI.</text>
    <rect class="cursor-sub" y="-14" width="10" height="18" visibility="hidden">
      <animate attributeName="visibility" to="visible" begin="2.5s" fill="freeze" />
      <animate attributeName="x" from="40" to="450" begin="2.5s" dur="2s" fill="freeze" />
    </rect>
  </g>

  <defs>
    <clipPath id="clip-title">
      <rect x="0" y="-30" width="0" height="40">
        <animate attributeName="width" from="0" to="380" dur="2s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip-sub">
      <rect x="0" y="-20" width="0" height="30">
        <animate attributeName="width" from="0" to="450" begin="2.5s" dur="2s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

</svg>
